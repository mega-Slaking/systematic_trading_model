# Install once with:  pip install pre-commit  &&  pre-commit install
# Runs the fast test suite (excludes the slow GARCH / backtest e2e) before each commit.
repos:
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast suite)
        entry: python -m pytest -m "not slow" -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
