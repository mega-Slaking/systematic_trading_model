[pytest]
pythonpath = .
testpaths = tests
# The legacy print-based validation script is not a pytest module yet (its
# test_* functions take positional args). Ignore until ported to tests/features/.
addopts = --ignore=tests/feature_surface_test.py
markers =
    unit: pure-function unit tests (no I/O, no fixtures)
    integration: multi-module / DB round-trip tests
    e2e: end-to-end pipeline tests
    regression: golden-output behaviour locks
    lookahead: lookahead-bias guards
    slow: slower tests (e.g. GARCH fits); deselect with -m "not slow"
